<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean JSONs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.2.2/jszip.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #f9f9f8;
            color: #242424;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 14px;
            min-height: 100vh;
            padding: 56px 18px 48px;
        }

        .page {
            max-width: 640px;
            margin: 0 auto;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0 0 8px;
            color: #242424;
        }

        p {
            margin: 0 0 20px;
            color: #666;
            line-height: 1.65;
        }

        h3 {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #888;
            margin: 24px 0 10px;
        }

        #form {
            background: #fff;
            border: 1px solid #e8e8e6;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 1px 0 rgba(17, 17, 17, 0.02);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group > label,
        .form-check-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding-left: 0;
        }

        .form-check-label {
            display: inline-flex;
            align-items: center;
            text-transform: none;
            letter-spacing: 0.01em;
            margin-bottom: 0;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            line-height: 1.2;
        }

        .form-check-input {
            margin: 0;
            margin-left: 0;
            margin-top: 0;
            position: static;
            accent-color: #242424;
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            align-self: center;
            cursor: pointer;
        }

        .form-control,
        .input-group .form-control {
            width: 100%;
            height: auto;
            border: 1px solid #e0e0de;
            border-radius: 6px;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 13px;
            color: #242424;
            background: #fff;
            box-shadow: none;
            transition: border-color 0.15s;
        }

        .form-control:focus,
        .input-group .form-control:focus {
            border-color: #aaa;
            outline: none;
            box-shadow: none;
        }

        #file {
            max-width: 100%;
        }

        #fields {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group {
            display: flex;
            align-items: stretch;
            flex-wrap: nowrap;
            width: 100%;
            margin-bottom: 0;
        }

        .input-group .form-control {
            flex: 1 1 auto;
            width: 1%;
            min-width: 0;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
            border-right: none;
        }

        .input-group-append {
            display: flex;
        }

        .input-group .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e0e0de;
            border-left: 1px solid #e8e8e6;
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
            border-top-right-radius: 6px;
            border-bottom-right-radius: 6px;
            background: #fff;
            color: #bbb;
            width: 42px;
            font-size: 18px;
            line-height: 1;
            padding: 0;
            transition: color 0.15s, border-color 0.15s, background-color 0.15s;
        }

        .input-group .btn:hover {
            border-color: #d7d7d4;
            background: #fafaf9;
            color: #d35a5a;
        }

        #log {
            margin-top: 18px;
            min-height: 22px;
            font-size: 12px;
            color: #777;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .actions .btn {
            border-radius: 6px;
            border: none;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.01em;
            padding: 11px 14px;
            transition: background 0.15s;
            box-shadow: none;
        }

        .actions #addField {
            width: 44px;
            min-width: 44px;
            padding: 0;
            font-size: 22px;
        }

        .actions .btn-primary {
            background: #242424;
            color: #fff;
        }

        .actions .btn-primary:hover,
        .actions .btn-primary:focus {
            background: #242424;
            color: #fff;
        }

        #sticky-link {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 5px;
            border-radius: 5px;
            text-decoration: underline;
            color: #242424;
            font-size: 14px;
        }

        @media (max-width: 640px) {
            body {
                padding: 48px 12px 28px;
            }

            #form {
                padding: 14px;
                border-radius: 8px;
            }

            h1 {
                font-size: 20px;
            }

            .actions {
                flex-direction: column;
            }

            .actions #addField,
            .actions button[type="submit"] {
                width: 100%;
            }

            .input-group .btn {
                width: 38px;
            }
        }
    </style>	
</head>
<body>
	<a id="sticky-link" href="../">Scatter Partners Webtools</a>
    <div class="page">
        <h1>Clean JSONs</h1>
        <form id="form">
            <div class="form-group">
                <label for="file">Upload a .zip of JSON files:</label>
                <input type="file" class="form-control" id="file" accept=".zip" style="width: initial; height: initial;">
            </div>
			<p>Some generators are meant for other chains and their metadata isn't useful for ETH NFTs. Many generators insert unnecessary metadata. This tool can help you remove these fields from all JSON files inside of a .zip file.</p>
            <h3>Fields to remove:</h3>
			<div class="form-group form-check">
                <input type="checkbox" class="form-check-input" id="remove-json-extension" checked>
                <label class="form-check-label" for="remove-json-extension">Remove .json file extension</label>
            </div>		
            <div id="fields">
                <!-- Default fields will be appended here -->
            </div>		

			<div id="log" class="mt-3"></div>
            <div class="actions">
                <button id="addField" type="button" class="btn btn-primary">+</button>
                <button type="submit" class="btn btn-primary">Clean and Download JSONs (.zip)</button>
            </div>
        </form>
    </div>
    <script>
    // Default fields to remove
    const defaultFields = ["imageHash", "dna", "edition", "date", "custom_fields", 
                           "file_url", "id", "seller_fee_basis_points", "compiler",
                           "properties", "collection"];

    // Function to create a new field row
    function createFieldRow(value) {
        const group = document.createElement('div');
        group.className = 'input-group mb-3';

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'form-control';
        input.value = value;
        group.appendChild(input);

        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'btn btn-outline-danger';
        button.textContent = '-';
        button.addEventListener('click', () => {
            group.remove();
        });
        const append = document.createElement('div');
        append.className = 'input-group-append';
        append.appendChild(button);
        group.appendChild(append);

        document.getElementById('fields').appendChild(group);
    }

    // Append default fields
    defaultFields.forEach(createFieldRow);

    document.getElementById('form').addEventListener('submit', (e) => {
		e.preventDefault();

		const file = document.getElementById('file').files[0];
		if (!file) {
			alert('Please select a file before clicking "Clean and Download".');
			return;
		}

		const removeExtension = document.getElementById('remove-json-extension').checked;
		const fields = Array.from(document.querySelectorAll('#fields .input-group')).map((group) => {
			return group.querySelector('input').value;
		});
		const log = document.getElementById('log');

        log.innerHTML = 'Processing... please wait! 😊';

        const reader = new FileReader();
        reader.onload = function(e) {
            const zip = new JSZip();
            const newZip = new JSZip();  // Create a new ZIP to store cleaned files

            zip.loadAsync(e.target.result).then((zipFiles) => {
                Object.values(zipFiles.files).forEach((zipEntry) => {
                    if (zipEntry.dir) return;

                    zipEntry.async('text').then((fileContent) => {
                        let data;
                        try {
                            data = JSON.parse(fileContent);
                        } catch (error) {
                            log.innerHTML += `Error parsing JSON from file "${zipEntry.name}": ${error}<br>`;
                            return;
                        }

                        fields.forEach((field) => {
                            delete data[field];
                        });

                        let filename = zipEntry.name;
                        if (removeExtension && filename.endsWith('.json')) {
                            filename = filename.slice(0, -5);
                        }

                        newZip.file(filename, JSON.stringify(data, null, 2));  // Add cleaned files to new ZIP
                    });
                });

                setTimeout(() => { // Allow time for all the file processing to finish
                    newZip.generateAsync({type: 'blob'}).then((content) => {
                        const url = URL.createObjectURL(content);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = 'clean-jsons.zip';
                        link.click();
                        log.innerHTML = 'ZIP file created and download initiated.<br>';
                    });
                }, 1000);
            });
        };
        reader.readAsArrayBuffer(file);
    });

    document.getElementById('addField').addEventListener('click', () => createFieldRow(''));
    </script>
</body>
</html>
