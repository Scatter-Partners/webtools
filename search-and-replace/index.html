<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search And Replace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f9f9f8;
      color: #242424;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      padding: 58px 24px 80px;
    }

    .page {
      max-width: 620px;
      margin: 0 auto;
    }

    #title {
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 22px;
      color: #242424;
    }

    #input_zone {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    #input_zone input {
      width: 100%;
      border: 1px solid #e0e0de;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      color: #242424;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      appearance: textfield;
    }

    #input_zone input:focus {
      border-color: #aaa;
    }

    #input_zone input::placeholder {
      color: #bbb;
    }

	#drop_zone {
      width: 100%;
      min-height: 210px;
	  padding: 14px;
	  border: 1px dashed #cfcfcb;
	  border-radius: 10px;
	  text-align: center;
	  font-size: 13px;
      color: #888;
	  margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      letter-spacing: 0.01em;
      transition: border-color 0.15s, background-color 0.15s;
	}

	#drop_zone:hover {
      border-color: #b9b9b6;
      background: #fafaf9;
	}

	#drop_zone.is-dragover {
      border-color: #242424;
      background: #f4f4f2;
      color: #242424;
	}

	#sticky-link {
	  position: fixed;
	  top: 10px;
	  left: 10px;
	  padding: 5px;
	  border-radius: 5px;
	  text-decoration: underline;
	  color: #242424;
	  font-size: 14px;
	}

    @media (max-width: 640px) {
      body {
        padding: 52px 14px 28px;
      }

      #title {
        font-size: 20px;
        margin-bottom: 16px;
      }

      #input_zone {
        grid-template-columns: 1fr;
        gap: 10px;
        margin-bottom: 14px;
      }

      #drop_zone {
        min-height: 170px;
      }
    }
  </style>
</head>
<body>
  <a id="sticky-link" href="../">Scatter Partners Webtools</a>
  <div class="page">
    <div id="title">Search And Replace</div>
    <div id="input_zone">
      <input type="text" id="search_term" placeholder="Search term">
      <input type="text" id="replace_term" placeholder="Replace term">
    </div>
    <div id="drop_zone">Drop your .zip here</div>
  </div>
  <script>
    let dropZone = document.getElementById('drop_zone');
    let dragDepth = 0;

    dropZone.addEventListener('dragenter', function(event) {
      event.preventDefault();
      dragDepth += 1;
      dropZone.classList.add('is-dragover');
    });

    dropZone.addEventListener('dragover', function(event) {
      event.preventDefault();
      dropZone.classList.add('is-dragover');
    });

    dropZone.addEventListener('dragleave', function(event) {
      event.preventDefault();
      dragDepth -= 1;
      if (dragDepth <= 0) {
        dragDepth = 0;
        dropZone.classList.remove('is-dragover');
      }
    });

    dropZone.addEventListener('drop', function(event) {
      event.preventDefault();
      dragDepth = 0;
      dropZone.classList.remove('is-dragover');
      processFiles(event.dataTransfer.files);
    });

    function processFiles(files) {
      if (files.length == 0) return;

      let file = files[0];
      if (file.name.split('.').pop() !== 'zip') {
        alert('Please upload a .zip file');
        return;
      }

      let zip = new JSZip();
      zip.loadAsync(file)
        .then(function(contents) {
          let newZip = new JSZip();
          let promiseList = [];
          let search_term = document.getElementById('search_term').value;
          let replace_term = document.getElementById('replace_term').value;
          Object.keys(contents.files).forEach(function(filename) {
            let fileData = contents.files[filename];
            if (!fileData.dir) {
              console.log(`Processing file: ${filename}`);
              let promise = fileData.async("string").then(function(content) {
                let newContent = content.replace(new RegExp(search_term, 'g'), replace_term);
                newZip.file(filename, newContent);
              });
              promiseList.push(promise);
            }
          });
          return Promise.all(promiseList).then(() => newZip);
        })
        .then(function(newZip) {
          newZip.generateAsync({type:"blob"})
            .then(function(content) {
              let timestamp = Date.now();
              console.log(`Saving processed zip as processed-${timestamp}.zip`);
              saveAs(content, `processed-${timestamp}.zip`);
            });
        });
    }
  </script>
</body>
</html>
