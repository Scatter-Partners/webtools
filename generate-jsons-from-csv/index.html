<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate JSONs from CSV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.2.2/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.2/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f9f9f8;
            color: #242424;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 14px;
            min-height: 100vh;
            padding: 60px 24px 80px;
        }

        .page {
            max-width: 620px;
            margin: 0 auto;
            width: 100%;
        }

        #title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
            color: #242424;
        }

        .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        #input_zone {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        #input_zone label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
        }

        #input_zone input[type="text"],
        #input_zone input[type="file"] {
            width: 100%;
            border: 1px solid #e0e0de;
            border-radius: 6px;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 13px;
            color: #242424;
            background: #fff;
            outline: none;
            transition: border-color 0.15s;
        }

        #input_zone input:focus {
            border-color: #aaa;
        }

        #input_zone br {
            display: none;
        }

        .field {
            margin-bottom: 2px;
        }

        #generate-button {
            width: 100%;
            background: #242424;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 13px;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            margin-top: 4px;
        }

        #generate-button:hover:not(:disabled) {
            background: #242424;
        }

        #generate-button:active:not(:disabled) {
            transform: scale(0.99);
        }

        #generate-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #sticky-link {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 5px;
            border-radius: 5px;
            text-decoration: underline;
            color: #242424;
            font-size: 14px;
        }

        #progress {
            min-height: 20px;
            margin-top: 6px;
            font-size: 12px;
            color: #888;
            letter-spacing: 0.01em;
        }

        @media (max-width: 640px) {
            body {
                padding: 52px 14px 28px;
            }

            #title {
                font-size: 18px;
                line-height: 1.2;
            }

            .subtitle {
                margin-bottom: 22px;
            }

            #generate-button {
                padding: 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <a id="sticky-link" href="../">Scatter Partners Webtools</a>
    <div class="page">
        <div id="title">Generate JSONs from CSV</div>
        <p class="subtitle">Build metadata JSON files in one pass from trait CSV rows and download them as a ready-to-use zip.</p>
        <div id="input_zone">
            <div class="field">
                <label for="cid">CID</label>
                <input type="text" id="cid">
            </div>
            <div class="field">
                <label for="filetype">Filetype</label>
                <input type="text" id="filetype" value=".png">
            </div>
            <div class="field">
                <label for="name">Name</label>
                <input type="text" id="name" value="Name #">
            </div>
            <div class="field">
                <label for="description">Description</label>
                <input type="text" id="description" value="Your description">
            </div>
            <div class="field">
                <label for="external-url">External URL</label>
                <input type="text" id="external-url" value="https://scatter.art/">
            </div>
            <div class="field">
                <label for="csv">Upload your CSV</label>
                <input type="file" id="csv">
            </div>
            <button id="generate-button" onclick="generateJSONs()">Generate and Download JSONs (.zip)</button>
            <p id="progress"></p>
        </div>
    </div>
    <script>
    function generateJSONs() {
        const button = document.getElementById('generate-button');
        const progress = document.getElementById('progress');
        button.disabled = true;
        button.innerText = 'Please Wait...';

        const protocol = "ipfs://";
        const cid = document.getElementById('cid').value;
        const filetype = document.getElementById('filetype').value;
        const name = document.getElementById('name').value;
        const description = document.getElementById('description').value;
        const externalUrl = document.getElementById('external-url').value;

        const csvFile = document.getElementById('csv').files[0];
        Papa.parse(csvFile, {
            header: true,
            complete: function(results) {
                const zip = new JSZip();
                const data = results.data;
                for (let i = 0; i < data.length; i++) {
                    const row = data[i];
                    const json = {
                        name: name + (i+1),
                        description: description,
                        external_url: externalUrl,
                        image: protocol + cid + "/" + (i+1) + filetype,
                        attributes: []
                    };
                    for (const key in row) {
                        if (row[key] && key !== "ID" && key !== "") {
                            json.attributes.push({
                                trait_type: key.trim(),
                                value: row[key].trim()
                            });
                        }
                    }
                    zip.file((i+1).toString(), JSON.stringify(json, null, 4));
                    progress.innerText = `Generating JSONs: ${Math.floor(((i+1)/data.length)*100)}%`;
                }
                zip.generateAsync({type:"blob"})
                    .then(function(content) {
                        saveAs(content, "jsons.zip");
                        button.disabled = false;
                        button.innerText = 'Generate and Download JSONs (.zip)';
                        progress.innerText = 'Done!';
                    });
            }
        });
    }
    </script>
</body>
</html>
