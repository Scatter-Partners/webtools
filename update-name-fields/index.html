<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Name Field in JSONs</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 56px 20px 64px;
      background: #f9f9f8;
      color: #242424;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    .page {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    #title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      text-align: left;
    }

    .subtitle {
      margin: 0 0 28px;
      color: #888;
      font-size: 13px;
    }

    #input_zone {
      background: #fff;
      border: 1px solid #e8e8e6;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .input-row {
      margin-bottom: 12px;
    }

    .input-row:last-child {
      margin-bottom: 0;
    }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    #name_prefix {
      width: 100%;
      border: 1px solid #e0e0de;
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      color: #242424;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    #name_prefix:focus {
      border-color: #aaa;
    }

    #name_prefix::placeholder {
      color: #bbb;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #666;
      font-size: 13px;
    }

    #include_filename {
      width: 14px;
      height: 14px;
      accent-color: #242424;
      cursor: pointer;
      flex-shrink: 0;
    }

    #input_zone label[for="include_filename"] {
      margin: 0;
      cursor: pointer;
      user-select: none;
    }

    #drop_zone {
      width: 100%;
      min-height: 200px;
      padding: 16px;
      border: 1px dashed #cfcfcb;
      border-radius: 10px;
      background: #fff;
      text-align: center;
      color: #888;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    #drop_zone:hover {
      border-color: #aaa;
      color: #555;
      background: #fcfcfb;
	}

    #drop_zone.is-dragover {
      border-color: #242424;
      color: #242424;
      background: #f4f4f2;
    }
	#sticky-link {
	  position: fixed;
	  top: 10px;
	  left: 10px;
	  padding: 5px;
	  border-radius: 5px;
	  text-decoration: underline;
	  color: #242424;
	  font-size: 14px;
	}

    @media (max-width: 640px) {
      body {
        padding: 52px 12px 28px;
      }

      #title {
        font-size: 20px;
      }

      #drop_zone {
        min-height: 170px;
      }
    }
  </style>
</head>
<body>
  <a id="sticky-link" href="../">Scatter Partners Webtools</a>

  <main class="page">
  <div id="title">Update Name Field in JSONs</div>
  <p class="subtitle">Drop a ZIP of metadata and export a cleanly renamed version in one pass.</p>
  <div id="input_zone">
    <div class="input-row">
      <label class="field-label" for="name_prefix">Name Prefix</label>
      <input type="text" id="name_prefix" placeholder="Name prefix">
    </div>
    <div class="input-row checkbox-row">
      <input type="checkbox" id="include_filename" checked>
      <label for="include_filename">Include token ID/number (filename)</label>
    </div>
  </div>
  <div id="drop_zone">Drop your .zip here</div>
  </main>
  <script>
    let dropZone = document.getElementById('drop_zone');
    let dragDepth = 0;

    dropZone.addEventListener('dragenter', function(event) {
      event.preventDefault();
      dragDepth += 1;
      dropZone.classList.add('is-dragover');
    });

    dropZone.addEventListener('dragover', function(event) {
      event.preventDefault();
      dropZone.classList.add('is-dragover');
    });

    dropZone.addEventListener('dragleave', function(event) {
      event.preventDefault();
      dragDepth -= 1;
      if (dragDepth <= 0) {
        dragDepth = 0;
        dropZone.classList.remove('is-dragover');
      }
    });

    dropZone.addEventListener('drop', function(event) {
      event.preventDefault();
      dragDepth = 0;
      dropZone.classList.remove('is-dragover');
      processFiles(event.dataTransfer.files);
    });

    function processFiles(files) {
      if (files.length == 0) return;

      let file = files[0];
      if (file.name.split('.').pop() !== 'zip') {
        alert('Please upload a .zip file');
        return;
      }

      let zip = new JSZip();
      zip.loadAsync(file)
        .then(function(contents) {
          let newZip = new JSZip();
          let promiseList = [];
          let name_prefix = document.getElementById('name_prefix').value;
          let include_filename = document.getElementById('include_filename').checked;

          Object.keys(contents.files).forEach(function(filename) {
            let fileData = contents.files[filename];
            if (!fileData.dir) {
              console.log(`Processing file: ${filename}`);
              let promise = fileData.async("string").then(function(content) {
                try {
                  let jsonContent = JSON.parse(content);
                  let newName = filename.split('/').pop().replace(/\.[^/.]+$/, ""); // Extract filename from full path
                  jsonContent['name'] = include_filename ? `${name_prefix}${newName}` : name_prefix;
                  newZip.file(filename, JSON.stringify(jsonContent, null, 4));
                } catch (e) {
                  console.error(`Error processing file: ${filename}`);
                }
              });
              promiseList.push(promise);
            }
          });
          return Promise.all(promiseList).then(() => newZip);
        })
        .then(function(newZip) {
          newZip.generateAsync({type:"blob"})
            .then(function(content) {
              let timestamp = Date.now();
              console.log(`Saving processed zip as processed-${timestamp}.zip`);
              saveAs(content, `processed-${timestamp}.zip`);
            });
        });
    }
  </script>
</body>
</html>
