<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Image Field in JSONs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f9f9f8;
      color: #242424;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      padding: 56px 20px 64px;
    }

    .page {
      max-width: 620px;
      margin: 0 auto;
    }

    #title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #242424;
      margin-bottom: 28px;
      text-align: left;
      width: 100%;
    }

    #input_zone {
      width: 100%;
      margin-bottom: 20px;
      display: grid;
      gap: 12px;
    }

    #input_zone input[type="text"],
    #input_zone input[type="file"] {
      width: 100%;
      border: 1px solid #e0e0de;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      color: #242424;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    #input_zone input[type="text"]:focus,
    #input_zone input[type="file"]:focus {
      border-color: #aaa;
    }

    #input_zone input[type="text"]::placeholder {
      color: #bbb;
    }

    #input_zone label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: -4px;
    }

    #input_zone br {
      display: none;
    }

    #drop_zone {
      width: 100%;
      min-height: 190px;
      border: 1px dashed #d8d8d6;
      border-radius: 8px;
      background: #fff;
      color: #777;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      font-size: 13px;
      letter-spacing: 0.01em;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    #drop_zone:hover {
      border-color: #bbb;
      background: #fafaf9;
      color: #555;
    }

    #drop_zone.is-dragover {
      border-color: #242424;
      background: #f4f4f2;
      color: #242424;
    }

    #drop_zone:active {
      background: #f4f4f2;
    }

    #sticky-link {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 5px;
      border-radius: 5px;
      text-decoration: underline;
      color: #242424;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      body {
        padding: 52px 14px 40px;
      }

      #title {
        font-size: 18px;
        margin-bottom: 20px;
      }

      #drop_zone {
        min-height: 150px;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>
</head>
<body>
  <a id="sticky-link" href="../">Scatter Partners Webtools</a>
  <div class="page">
    <div id="title">Update Image Field in JSONs</div>
    <div id="input_zone">
      <input type="text" id="cid" placeholder="CID">
      <input type="text" id="filetype" placeholder="File type (default: .png)">
      <br>
      <label for="file_input">Select a .zip file:</label>
      <input type="file" id="file_input" accept=".zip">
    </div>
    <div id="drop_zone">Drop your .zip here</div>
  </div>
  <script>
    let dropZone = document.getElementById('drop_zone');
    let dragDepth = 0;

    dropZone.addEventListener('dragenter', function(event) {
      event.preventDefault();
      dragDepth += 1;
      dropZone.classList.add('is-dragover');
    });

    dropZone.addEventListener('dragover', function(event) {
      event.preventDefault();
      dropZone.classList.add('is-dragover');
    });

    dropZone.addEventListener('dragleave', function(event) {
      event.preventDefault();
      dragDepth -= 1;
      if (dragDepth <= 0) {
        dragDepth = 0;
        dropZone.classList.remove('is-dragover');
      }
    });

    dropZone.addEventListener('drop', function(event) {
      event.preventDefault();
      dragDepth = 0;
      dropZone.classList.remove('is-dragover');
      processFiles(event.dataTransfer.files);
    });

    document.getElementById('file_input').addEventListener('change', function(event) {
      processFiles(event.target.files);
    });

    function processFiles(files) {
      if (files.length == 0) return;

      let file = files[0];
      if (file.name.split('.').pop().toLowerCase() !== 'zip') {
        alert('Please upload a .zip file');
        return;
      }

      let zip = new JSZip();
      zip.loadAsync(file)
        .then(function(contents) {
          let newZip = new JSZip();
          let promiseList = [];
          let cid = document.getElementById('cid').value;
          let filetype = document.getElementById('filetype').value;
          filetype = filetype !== '' ? (filetype.startsWith('.') ? filetype : '.' + filetype) : '.png';

          Object.keys(contents.files).forEach(function(filename) {
            let fileData = contents.files[filename];
            if (!fileData.dir) {
              console.log(`Processing file: ${filename}`);
              let promise = fileData.async("string").then(function(content) {
                try {
                  let jsonContent = JSON.parse(content);
                  let baseFilename = filename.split('/').pop().replace(/\.[^/.]+$/, "");
                  jsonContent['image'] = `ipfs://${cid}/${baseFilename}${filetype}`;
                  newZip.file(filename, JSON.stringify(jsonContent, null, 4));
                } catch (e) {
                  console.error(`Error processing file: ${filename}`);
                }
              });
              promiseList.push(promise);
            }
          });
          return Promise.all(promiseList).then(() => newZip);
        })
        .then(function(newZip) {
          newZip.generateAsync({type:"blob"})
            .then(function(content) {
              let timestamp = Date.now();
              console.log(`Saving processed zip as processed-${timestamp}.zip`);
              saveAs(content, `processed-${timestamp}.zip`);
            });
        });
    }
  </script>
</body>
</html>
