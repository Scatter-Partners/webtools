<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHA-256 String</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f9f9f8;
      color: #242424;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      padding: 60px 16px 40px;
    }

    .page {
      max-width: 620px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    #title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #242424;
    }

    #text-container {
      color: #888;
      font-size: 13px;
      line-height: 1.5;
    }

    #sticky-link {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 5px;
      border-radius: 5px;
      text-decoration: underline;
      color: #242424;
      font-size: 14px;
    }

    #hashing-container {
      background: #fff;
      border: 1px solid #e8e8e6;
      border-radius: 8px;
      padding: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    #text-to-hash {
      margin-top: 0;
      padding: 10px 12px;
      width: 100%;
      min-height: 132px;
      border: 1px solid #e0e0de;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      color: #242424;
      background: #fff;
      outline: none;
      resize: vertical;
      transition: border-color 0.15s;
    }

    #text-to-hash:focus {
      border-color: #aaa;
    }

    button {
      margin-top: 14px;
      width: 100%;
      background: #242424;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 12px;
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover {
      background: #242424;
    }

    button:active {
      transform: scale(0.99);
    }

    #hash-output {
      margin-top: 0;
      border: 1px solid #e8e8e6;
      border-radius: 8px;
      background: #fff;
      padding: 12px 14px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: #555;
      line-height: 1.6;
      word-break: break-word;
      min-height: 48px;
    }

    @media (max-width: 640px) {
      body {
        padding: 52px 12px 24px;
      }

      #hashing-container {
        padding: 14px;
      }

      button {
        padding: 11px;
      }
    }
  </style>
</head>
<body>
  <a id="sticky-link" href="https://webtools.scatter.art">Scatter Partners Webtools</a>
  <div class="page">
    <div id="title">SHA-256 String</div>
    <div id="text-container">Generate a deterministic SHA-256 hash from any input text.</div>

    <div id="hashing-container">
      <label for="text-to-hash">Enter text</label>
      <textarea rows="5" cols="60" type="text" id="text-to-hash"></textarea>
      <button onclick="generateHash()">Generate SHA-256 Hash</button>
    </div>

    <div id="hash-output"></div>
  </div>

<script>
function generateHash() {
  const text = document.getElementById("text-to-hash").value;
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  window.crypto.subtle.digest('SHA-256', data).then(hash => {
    const hashArray = Array.from(new Uint8Array(hash));
    const hashHex = hashArray.map(byte => byte.toString(16).padStart(2, '0')).join('');
    document.getElementById("hash-output").innerHTML = 'SHA-256 Hash: ' + hashHex;
  });
}
</script>
</body>
</html>
