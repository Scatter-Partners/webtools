<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snapshot Multiple Collections</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #f9f9f8;
      color: #242424;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      padding: 72px 20px 40px;
      display: flex;
      justify-content: center;
    }

    .page {
      width: min(100%, 620px);
    }

    #title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      color: #242424;
    }

    #text-container {
      margin-top: 6px;
      padding-top: 20px;
      border-top: 1px solid #e8e8e6;
    }

    #text-container h2 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: #888;
      line-height: 1.5;
    }

    #text-container h2 a {
      color: inherit;
      text-underline-offset: 2px;
      transition: color 0.15s;
    }

    #text-container h2 a:hover {
      color: #333;
    }

    #input-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    #api-key-input,
    #collection-addresses-input,
    #block-number-input {
      width: 100%;
      margin-top: 10px;
      border: 1px solid #e0e0de;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      color: #242424;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    #api-key-input:focus,
    #collection-addresses-input:focus,
    #block-number-input:focus {
      border-color: #aaa;
    }

    #include-balance-checkbox {
      margin-top: 10px;
      accent-color: #242424;
    }

    #snapshot-button {
      width: 100%;
      margin-top: 12px;
      border: none;
      border-radius: 6px;
      padding: 12px;
      background: #242424;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    #snapshot-button:hover:not([disabled]) {
      background: #242424;
    }

    #snapshot-button:active:not([disabled]) {
      transform: scale(0.99);
    }

    #snapshot-button[disabled] {
      background: #ccc;
      cursor: not-allowed;
    }

    #log-box {
      margin-top: 20px;
      width: 100%;
      height: 220px;
      border: 1px solid #e8e8e6;
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      overflow: auto;
      white-space: pre-wrap;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.8;
    }

    #sticky-link {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 5px;
      border-radius: 5px;
      text-decoration: underline;
      color: #242424;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      body {
        padding: 64px 14px 28px;
      }

      #title {
        font-size: 20px;
      }

      #text-container h2 {
        font-size: 12px;
      }

      #log-box {
        height: 200px;
      }
    }
  </style>
</head>
<body>
  <a id="sticky-link" href="https://webtools.scatter.art">Scatter Partners Webtools</a>

  <main class="page">
    <div id="title">Snapshot Multiple Collections</div>
    <div id="text-container">
      <h2><a href="https://www.holders.art/">Snapshot Holders with Holders.art</a></h2>
    </div>
  </main>
  <script>
    window.location.replace("https://www.holders.art/");
  </script>
</body>
</html>
