<!DOCTYPE html>
<html>
<head>
  <title>Remove File Extensions</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 64px 16px 40px;
      background: #f9f9f8;
      color: #242424;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 620px;
    }

    #title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;

      text-align: center;
    }

    .subtitle {
      color: #888;
      font-size: 13px;
      text-align: center;
      margin-bottom: 24px;
    }

    #drop_zone {
      width: 100%;
      max-width: 520px;
      min-height: 220px;
      margin: 0 auto;
      border: 1px dashed #d8d8d6;
      border-radius: 10px;
      background: #fff;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      font-size: 15px;
      line-height: 1.5;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    #drop_zone:hover {
      border-color: #bbb;
      background: #fafaf9;
      color: #333;
    }

    #drop_zone.is-dragover {
      border-color: #242424;
      background: #f4f4f2;
      color: #242424;
    }

    #sticky-link {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 5px;
      border-radius: 5px;
      text-decoration: underline;
      color: #242424;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      body {
        padding: 56px 12px 28px;
      }

      #title {
        font-size: 18px;
      }

      .subtitle {
        font-size: 12px;
        margin-bottom: 18px;
      }

      #drop_zone {
        min-height: 180px;
        padding: 18px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <a id="sticky-link" href="../">Scatter Partners Webtools</a>

  <main class="page">
    <div id="title">Remove File Extensions</div>
    <p class="subtitle">Drop a zip archive and download a copy with extensions removed.</p>
    <div id="drop_zone">Drop your .zip here</div>
  </main>

  <script>
    let dropZone = document.getElementById('drop_zone');
    let dragDepth = 0;

    dropZone.addEventListener('dragenter', function(event) {
      event.preventDefault();
      dragDepth += 1;
      dropZone.classList.add('is-dragover');
    });

    dropZone.addEventListener('dragover', function(event) {
      event.preventDefault();
      dropZone.classList.add('is-dragover');
    });

    dropZone.addEventListener('dragleave', function(event) {
      event.preventDefault();
      dragDepth -= 1;
      if (dragDepth <= 0) {
        dragDepth = 0;
        dropZone.classList.remove('is-dragover');
      }
    });

    dropZone.addEventListener('drop', function(event) {
      event.preventDefault();
      dragDepth = 0;
      dropZone.classList.remove('is-dragover');
      processFiles(event.dataTransfer.files);
    });

    function processFiles(files) {
      if (files.length == 0) return;

      let file = files[0];
      if (file.name.split('.').pop() !== 'zip') {
        alert('Please upload a .zip file');
        return;
      }

      let zip = new JSZip();
      zip.loadAsync(file)
        .then(function(contents) {
          let newZip = new JSZip();
          let promiseList = [];
          Object.keys(contents.files).forEach(function(filename) {
            let fileData = contents.files[filename];
            if (!fileData.dir) {
              let newName = filename.replace(/\.[^/.]+$/, "");  // remove extension
              console.log(`Processing file: ${filename}`);
              let promise = fileData.async("arraybuffer").then(function(content) {
                newZip.file(newName, content, {binary:true});
              });
              promiseList.push(promise);
            }
          });
          return Promise.all(promiseList).then(() => newZip);
        })
        .then(function(newZip) {
          newZip.generateAsync({type:"blob"})
            .then(function(content) {
              let timestamp = Date.now();
              console.log(`Saving processed zip as processed-${timestamp}.zip`);
              saveAs(content, `processed-${timestamp}.zip`);
            });
        });
    }
  </script>
</body>
</html>
